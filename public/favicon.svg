<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="PRM">
  <defs>
    <!--
      Orb gradient: simulates the polished glass appearance using a
      radial gradient. Brighter top-left (key light), darker bottom-right.
      Self-contained, no backdrop-filter needed.
    -->
    <radialGradient id="orb-fill" cx="32%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#5d7eb8" stop-opacity="0.95" />
      <stop offset="35%" stop-color="#3a4f80" stop-opacity="0.92" />
      <stop offset="75%" stop-color="#1c2647" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#0a0e27" stop-opacity="0.95" />
    </radialGradient>

    <!-- Top-edge bevel highlight (the curved bright arc at top of orb) -->
    <linearGradient id="orb-bevel-top" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Atmospheric glow around the orb -->
    <radialGradient id="orb-glow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#5b8cff" stop-opacity="0" />
      <stop offset="85%" stop-color="#5b8cff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0" />
    </radialGradient>

    <!--
      Embossed chevron filter (simplified for favicon use).
      Uses single specular light. The complex 12-surface-scale filter
      from BrandMark.astro is too heavy for browser favicon rendering.
    -->
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur" />
      <feSpecularLighting
        in="blur"
        surfaceScale="6"
        specularConstant="2"
        specularExponent="20"
        lighting-color="#ffffff"
        result="spec"
      >
        <fePointLight x="-30" y="-80" z="120" />
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="masked" />
      <feMerge>
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="masked" />
      </feMerge>
    </filter>
  </defs>

  <!-- Atmospheric glow extending beyond the orb -->
  <circle cx="50" cy="50" r="50" fill="url(#orb-glow)" />

  <!-- Main orb body -->
  <circle cx="50" cy="50" r="44" fill="url(#orb-fill)" />

  <!-- Top bevel highlight (curved arc following the top of the orb) -->
  <circle cx="50" cy="50" r="44" fill="url(#orb-bevel-top)" />

  <!-- Outer thin highlight ring -->
  <circle
    cx="50"
    cy="50"
    r="44"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.55"
    stroke-width="0.8" />

  <!-- Inner subtle dark ring (suggests glass thickness) -->
  <circle
    cx="50"
    cy="50"
    r="42"
    fill="none"
    stroke="#000000"
    stroke-opacity="0.20"
    stroke-width="0.5" />

  <!-- The chevron mark, embossed -->
  <path
    d="M 34 20 L 70 50 L 34 80"
    stroke="#dbe5fa"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#emboss)" />
</svg>
